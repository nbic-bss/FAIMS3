# Manually renew expired Fastlane Match iOS signing certificates.
#
# Destructive: revokes existing distribution (and optionally development)
# certificates on Apple Developer, then regenerates them into MATCH_GIT_URL.
#
# Before first use, create a GitHub Environment named "ios-signing" and add
# required reviewers so this cannot be run by accident.
name: Renew iOS Match Certificates

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "renew" to revoke and regenerate Match certificates'
        required: true
        type: string
      include_development:
        description: Also renew development certificates (BrowserStack / debug)
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  renew-match:
    name: Nuke and regenerate Match certs
    if: ${{ github.event.inputs.confirm == 'renew' }}
    runs-on: macos-latest
    environment: ios-signing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.1
          bundler-cache: true
          working-directory: app/ios/App

      - name: Install Fastlane plugins
        working-directory: app/ios/App
        run: |
          bundle install
          bundle exec fastlane install_plugins

      - name: Renew Match certificates
        working-directory: app/ios/App
        env:
          VITE_APPLE_BUNDLE_IDENTIFIER: ${{ vars.APPLE_BUNDLE_IDENTIFIER }}
          DEVELOPER_PORTAL_TEAM_ID: ${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}
          VITE_APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ vars.MATCH_GIT_URL }}
          GIT_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
        run: |
          bundle exec fastlane ios renew_match include_development:${{ github.event.inputs.include_development }}
